<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-2: #eef2f7;
      --text: #1d2733;
      --muted: #617084;
      --line: #d9e0ea;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --code-bg: #111827;
      --code-text: #e5e7eb;
      --shadow: 0 18px 45px rgba(29, 39, 51, 0.12);
      --radius: 8px;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #11151c;
      --surface: #1b222d;
      --surface-2: #252e3a;
      --text: #edf2f7;
      --muted: #a6b3c3;
      --line: #344052;
      --accent: #60a5fa;
      --accent-dark: #93c5fd;
      --code-bg: #090d13;
      --code-text: #f3f4f6;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Meiryo", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius);
      min-height: 40px;
      padding: 0 12px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      background: var(--surface-2);
      border-color: var(--accent);
    }

    button:active {
      transform: translateY(1px);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px clamp(14px, 2.4vw, 28px);
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .file-button {
      position: relative;
      overflow: hidden;
    }

    .file-button input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1.1fr);
      gap: 18px;
      padding: 18px clamp(14px, 2.4vw, 28px) 28px;
      min-height: 0;
    }

    .pane {
      min-width: 0;
      min-height: calc(100vh - 102px);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    .pane-title {
      font-weight: 700;
      font-size: 14px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      min-height: 100%;
      resize: none;
      border: 0;
      outline: 0;
      color: var(--text);
      background: var(--surface);
      padding: 18px;
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 14px;
      line-height: 1.7;
      tab-size: 2;
    }

    .preview-shell {
      overflow: auto;
      background: var(--surface);
    }

    .preview {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px clamp(18px, 4vw, 46px) 56px;
      line-height: 1.78;
      overflow-wrap: anywhere;
    }

    .preview :first-child {
      margin-top: 0;
    }

    .preview h1,
    .preview h2,
    .preview h3,
    .preview h4 {
      line-height: 1.35;
      margin: 1.6em 0 0.65em;
    }

    .preview h1 {
      font-size: 2rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.35em;
    }

    .preview h2 {
      font-size: 1.45rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.28em;
    }

    .preview h3 {
      font-size: 1.18rem;
    }

    .preview a {
      color: var(--accent);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.2em;
    }

    .preview blockquote {
      margin: 1.2em 0;
      padding: 0.15em 1em;
      color: var(--muted);
      border-left: 4px solid var(--accent);
      background: color-mix(in srgb, var(--surface-2) 68%, transparent);
    }

    .preview code {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0.12em 0.35em;
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 0.92em;
    }

    .preview pre {
      overflow: auto;
      background: var(--code-bg);
      color: var(--code-text);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--line);
    }

    .preview pre code {
      background: transparent;
      color: inherit;
      border: 0;
      padding: 0;
      font-size: 0.95em;
    }

    .mermaid-block {
      margin: 1.4em 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
      overflow: auto;
    }

    .mermaid {
      display: grid;
      place-items: center;
      min-height: 120px;
    }

    .mermaid svg {
      max-width: 100%;
      height: auto;
    }

    .mermaid-note,
    .mermaid-error {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .mermaid-error {
      color: #b91c1c;
    }

    .preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2em 0;
      font-size: 0.95em;
    }

    .preview th,
    .preview td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      vertical-align: top;
    }

    .preview th {
      background: var(--surface-2);
      text-align: left;
    }

    .preview img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
    }

    .preview hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 2em 0;
    }

    .drop-active .editor-pane {
      outline: 3px solid var(--accent);
      outline-offset: -6px;
    }

    @media (max-width: 900px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .pane {
        min-height: 520px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .topbar,
      .editor-pane,
      .preview-pane .pane-head {
        display: none;
      }

      .workspace,
      .app {
        display: block;
        padding: 0;
      }

      .pane,
      .preview-shell {
        border: 0;
        box-shadow: none;
        min-height: auto;
        overflow: visible;
      }

      .preview {
        max-width: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <h1>Markdown Viewer</h1>
      </div>
      <div class="toolbar">
        <button class="file-button" type="button" title="Markdownファイルを読み込む">
          開く
          <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain">
        </button>
        <button id="sampleButton" type="button" title="サンプルを読み込む">サンプル</button>
        <button id="copyButton" type="button" title="表示結果のHTMLをコピー">HTMLコピー</button>
        <button id="printButton" type="button" title="プレビューを印刷">印刷</button>
        <button id="themeButton" type="button" title="明るい表示と暗い表示を切り替える">ダーク</button>
      </div>
    </header>

    <main class="workspace">
      <section class="pane editor-pane" aria-label="Markdown editor">
        <div class="pane-head">
          <span class="pane-title">Markdown</span>
          <span class="meta" id="sourceMeta">0文字</span>
        </div>
        <textarea id="source" spellcheck="false" aria-label="Markdown本文"></textarea>
      </section>

      <section class="pane preview-pane" aria-label="Preview">
        <div class="pane-head">
          <span class="pane-title">Preview</span>
          <span class="meta" id="previewMeta">待機中</span>
        </div>
        <div class="preview-shell">
          <article class="preview" id="preview"></article>
        </div>
      </section>
    </main>
  </div>

  <script src="vendor/mermaid.min.js"></script>
  <script>
    const sampleMarkdown = `# 社内向けMarkdownビューア

このHTMLはブラウザだけで動くMarkdownビューアです。外部CDNや拡張機能は使いません。

## できること

- Markdownを貼り付けて即時プレビュー
- \`.md\` ファイルの読み込み
- テーブル、チェックリスト、コードブロックの表示
- 表示結果のHTMLコピー
- 印刷またはPDF保存

## テーブル

| 項目 | 状態 | メモ |
| --- | --- | --- |
| 見出し | OK | # から ###### まで |
| リスト | OK | 箇条書き、番号付き、チェック |
| コード | OK | インラインとフェンス |

## コード

\`\`\`js
function greet(name) {
  return \`Hello, \${name}\`;
}
\`\`\`

## Mermaid

\`\`\`mermaid
flowchart LR
  A[Markdownを書く] --> B{Mermaidブロック?}
  B -->|はい| C[図として表示]
  B -->|いいえ| D[通常のMarkdown表示]
\`\`\`

> 社内の制限が強い場所でも、HTMLファイルを開ける環境なら使えます。
`;

    const source = document.getElementById("source");
    const preview = document.getElementById("preview");
    const sourceMeta = document.getElementById("sourceMeta");
    const previewMeta = document.getElementById("previewMeta");
    const fileInput = document.getElementById("fileInput");
    const sampleButton = document.getElementById("sampleButton");
    const copyButton = document.getElementById("copyButton");
    const printButton = document.getElementById("printButton");
    const themeButton = document.getElementById("themeButton");
    const app = document.getElementById("app");
    let renderRun = 0;

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function sanitizeUrl(url) {
      const trimmed = url.trim();
      if (/^(https?:|mailto:|tel:|#|\.\/|\.\.\/|\/)/i.test(trimmed)) {
        return trimmed;
      }
      return "#";
    }

    function inlineMarkdown(text) {
      let value = escapeHtml(text);
      const code = [];
      value = value.replace(/`([^`]+)`/g, (_, snippet) => {
        code.push(`<code>${snippet}</code>`);
        return `\u0000CODE${code.length - 1}\u0000`;
      });
      value = value.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) => {
        return `<img src="${escapeHtml(sanitizeUrl(url))}" alt="${escapeHtml(alt)}">`;
      });
      value = value.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
        return `<a href="${escapeHtml(sanitizeUrl(url))}" target="_blank" rel="noopener noreferrer">${label}</a>`;
      });
      value = value.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      value = value.replace(/__([^_]+)__/g, "<strong>$1</strong>");
      value = value.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      value = value.replace(/_([^_]+)_/g, "<em>$1</em>");
      value = value.replace(/~~([^~]+)~~/g, "<del>$1</del>");
      return value.replace(/\u0000CODE(\d+)\u0000/g, (_, index) => code[Number(index)]);
    }

    function isTable(lines, index) {
      if (index + 1 >= lines.length) return false;
      return lines[index].includes("|") && /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[index + 1]);
    }

    function splitTableRow(row) {
      return row.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map((cell) => cell.trim());
    }

    function closeParagraph(state, html) {
      if (state.paragraph.length) {
        html.push(`<p>${inlineMarkdown(state.paragraph.join(" "))}</p>`);
        state.paragraph = [];
      }
    }

    function closeLists(state, html) {
      while (state.lists.length) {
        html.push(`</${state.lists.pop()}>`);
      }
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n?/g, "\n").split("\n");
      const html = [];
      const state = { paragraph: [], lists: [] };
      let inCode = false;
      let codeLang = "";
      let codeLines = [];

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];

        if (/^\s*```/.test(line)) {
          if (inCode) {
            const codeText = codeLines.join("\n");
            if (codeLang.toLowerCase() === "mermaid") {
              html.push(`<div class="mermaid-block"><div class="mermaid" data-source="${escapeHtml(codeText)}">${escapeHtml(codeText)}</div><p class="mermaid-note">Mermaidを描画するには vendor/mermaid.min.js が必要です。</p></div>`);
            } else {
              html.push(`<pre><code${codeLang ? ` data-lang="${escapeHtml(codeLang)}"` : ""}>${escapeHtml(codeText)}</code></pre>`);
            }
            inCode = false;
            codeLang = "";
            codeLines = [];
          } else {
            closeParagraph(state, html);
            closeLists(state, html);
            inCode = true;
            codeLang = line.replace(/^\s*```/, "").trim();
          }
          continue;
        }

        if (inCode) {
          codeLines.push(line);
          continue;
        }

        if (!line.trim()) {
          closeParagraph(state, html);
          closeLists(state, html);
          continue;
        }

        if (/^\s{0,3}(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
          closeParagraph(state, html);
          closeLists(state, html);
          html.push("<hr>");
          continue;
        }

        if (isTable(lines, i)) {
          closeParagraph(state, html);
          closeLists(state, html);
          const headers = splitTableRow(lines[i]);
          i += 2;
          const rows = [];
          while (i < lines.length && lines[i].includes("|") && lines[i].trim()) {
            rows.push(splitTableRow(lines[i]));
            i += 1;
          }
          i -= 1;
          html.push("<table><thead><tr>");
          headers.forEach((header) => html.push(`<th>${inlineMarkdown(header)}</th>`));
          html.push("</tr></thead><tbody>");
          rows.forEach((row) => {
            html.push("<tr>");
            headers.forEach((_, cellIndex) => html.push(`<td>${inlineMarkdown(row[cellIndex] || "")}</td>`));
            html.push("</tr>");
          });
          html.push("</tbody></table>");
          continue;
        }

        const heading = line.match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          closeParagraph(state, html);
          closeLists(state, html);
          const level = heading[1].length;
          html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
          continue;
        }

        const quote = line.match(/^>\s?(.*)$/);
        if (quote) {
          closeParagraph(state, html);
          closeLists(state, html);
          const quoteLines = [quote[1]];
          while (i + 1 < lines.length && /^>\s?(.*)$/.test(lines[i + 1])) {
            i += 1;
            quoteLines.push(lines[i].replace(/^>\s?/, ""));
          }
          html.push(`<blockquote>${renderMarkdown(quoteLines.join("\n"))}</blockquote>`);
          continue;
        }

        const unordered = line.match(/^\s*[-*+]\s+(\[[ xX]\]\s+)?(.+)$/);
        const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
        if (unordered || ordered) {
          closeParagraph(state, html);
          const type = ordered ? "ol" : "ul";
          if (state.lists[state.lists.length - 1] !== type) {
            closeLists(state, html);
            state.lists.push(type);
            html.push(`<${type}>`);
          }
          if (unordered) {
            const checked = unordered[1] && /x/i.test(unordered[1]);
            const task = unordered[1] ? `<input type="checkbox" disabled${checked ? " checked" : ""}> ` : "";
            html.push(`<li>${task}${inlineMarkdown(unordered[2])}</li>`);
          } else {
            html.push(`<li>${inlineMarkdown(ordered[1])}</li>`);
          }
          continue;
        }

        closeLists(state, html);
        state.paragraph.push(line.trim());
      }

      if (inCode) {
        html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
      }
      closeParagraph(state, html);
      closeLists(state, html);
      return html.join("\n");
    }

    async function renderMermaidBlocks(runId) {
      const blocks = Array.from(preview.querySelectorAll(".mermaid"));
      if (!blocks.length) return;

      if (!window.mermaid) {
        previewMeta.textContent = `${previewMeta.textContent} / Mermaid未読込`;
        return;
      }

      try {
        window.mermaid.initialize({
          startOnLoad: false,
          securityLevel: "strict",
          theme: document.documentElement.dataset.theme === "dark" ? "dark" : "default"
        });

        for (let index = 0; index < blocks.length; index += 1) {
          if (runId !== renderRun) return;
          const block = blocks[index];
          const sourceText = block.dataset.source || block.textContent || "";
          const id = `mermaid-${Date.now()}-${index}`;
          try {
            const result = await window.mermaid.render(id, sourceText);
            if (runId !== renderRun) return;
            block.innerHTML = result.svg || result;
            const note = block.parentElement.querySelector(".mermaid-note");
            if (note) note.remove();
          } catch (error) {
            block.innerHTML = `<pre><code>${escapeHtml(sourceText)}</code></pre>`;
            const note = block.parentElement.querySelector(".mermaid-note");
            if (note) {
              note.className = "mermaid-error";
              note.textContent = `Mermaidの構文を確認してください: ${error.message || error}`;
            }
          }
        }
      } catch (error) {
        previewMeta.textContent = `${previewMeta.textContent} / Mermaid初期化失敗`;
      }
    }

    function updatePreview() {
      const runId = ++renderRun;
      const markdown = source.value;
      preview.innerHTML = renderMarkdown(markdown);
      sourceMeta.textContent = `${markdown.length.toLocaleString("ja-JP")}文字`;
      const elementCount = preview.querySelectorAll("h1,h2,h3,h4,h5,h6,p,li,table,pre,blockquote,.mermaid-block").length;
      const mermaidCount = preview.querySelectorAll(".mermaid").length;
      previewMeta.textContent = `${elementCount.toLocaleString("ja-JP")}要素${mermaidCount ? ` / Mermaid ${mermaidCount.toLocaleString("ja-JP")}件` : ""}`;
      localStorage.setItem("markdown-viewer-content", markdown);
      renderMermaidBlocks(runId);
    }

    function decodeText(buffer, encoding, fatal = false) {
      return new TextDecoder(encoding, { fatal }).decode(buffer);
    }

    function readMarkdownFile(file) {
      return file.arrayBuffer().then((buffer) => {
        const attempts = [
          () => decodeText(buffer, "utf-8", true),
          () => decodeText(buffer, "shift_jis", true),
          () => decodeText(buffer, "euc-jp", true),
          () => decodeText(buffer, "iso-2022-jp", true),
          () => decodeText(buffer, "utf-8")
        ];

        for (const attempt of attempts) {
          try {
            return attempt();
          } catch (error) {
            // 次のエンコーディング候補を試す
          }
        }
        return "";
      });
    }

    function loadMarkdown(text, name) {
      source.value = text;
      updatePreview();
      if (name) {
        sourceMeta.textContent = `${name} / ${text.length.toLocaleString("ja-JP")}文字`;
      }
    }

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      loadMarkdown(await readMarkdownFile(file), file.name);
      fileInput.value = "";
    });

    sampleButton.addEventListener("click", () => loadMarkdown(sampleMarkdown, "sample.md"));
    printButton.addEventListener("click", () => window.print());

    copyButton.addEventListener("click", async () => {
      const html = `<!doctype html>\n<meta charset="utf-8">\n${preview.outerHTML}`;
      try {
        await navigator.clipboard.writeText(html);
        copyButton.textContent = "コピー済み";
        setTimeout(() => { copyButton.textContent = "HTMLコピー"; }, 1400);
      } catch (error) {
        const blob = new Blob([html], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "markdown-preview.html";
        link.click();
        URL.revokeObjectURL(url);
      }
    });

    themeButton.addEventListener("click", () => {
      const next = document.documentElement.dataset.theme === "dark" ? "" : "dark";
      document.documentElement.dataset.theme = next;
      themeButton.textContent = next ? "ライト" : "ダーク";
      localStorage.setItem("markdown-viewer-theme", next);
    });

    source.addEventListener("input", updatePreview);
    source.addEventListener("keydown", (event) => {
      if (event.key === "Tab") {
        event.preventDefault();
        const start = source.selectionStart;
        const end = source.selectionEnd;
        source.value = `${source.value.slice(0, start)}  ${source.value.slice(end)}`;
        source.selectionStart = source.selectionEnd = start + 2;
        updatePreview();
      }
    });

    ["dragenter", "dragover"].forEach((eventName) => {
      window.addEventListener(eventName, (event) => {
        event.preventDefault();
        app.classList.add("drop-active");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      window.addEventListener(eventName, (event) => {
        event.preventDefault();
        if (eventName === "drop") {
          const file = event.dataTransfer.files && event.dataTransfer.files[0];
          if (file) readMarkdownFile(file).then((text) => loadMarkdown(text, file.name));
        }
        app.classList.remove("drop-active");
      });
    });

    const savedTheme = localStorage.getItem("markdown-viewer-theme");
    if (savedTheme) {
      document.documentElement.dataset.theme = savedTheme;
      themeButton.textContent = "ライト";
    }

    source.value = localStorage.getItem("markdown-viewer-content") || sampleMarkdown;
    updatePreview();
  </script>
</body>
</html>
